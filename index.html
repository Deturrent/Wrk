<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Elevate Fitness</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { background-color: #09090b; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const apiKey = "";

    // Exponential Backoff Fetch Wrapper
    const fetchWithRetry = async (url, options) => {
      const delays = [1000, 2000, 4000, 8000, 16000];
      for (let i = 0; i < 5; i++) {
        try {
          const res = await fetch(url, options);
          if (!res.ok) throw new Error(`API Error: ${res.status}`);
          return await res.json();
        } catch (err) {
          if (i === 4) throw err;
          await new Promise(r => setTimeout(r, delays[i]));
        }
      }
    };

    // Helper: Convert PCM to Playable WAV Blob
    const playAudioFromBase64PCM = (base64Data, sampleRate) => {
      const binaryString = window.atob(base64Data);
      const len = binaryString.length;
      const bytes = new Uint8Array(len);
      for (let i = 0; i < len; i++) {
        bytes[i] = binaryString.charCodeAt(i);
      }
      
      const buffer = new ArrayBuffer(44 + len);
      const view = new DataView(buffer);
      
      const writeString = (view, offset, string) => {
        for (let i = 0; i < string.length; i++) {
          view.setUint8(offset + i, string.charCodeAt(i));
        }
      };
      
      writeString(view, 0, 'RIFF');
      view.setUint32(4, 36 + len, true);
      writeString(view, 8, 'WAVE');
      writeString(view, 12, 'fmt ');
      view.setUint32(16, 16, true);
      view.setUint16(20, 1, true);
      view.setUint16(22, 1, true); // 1 channel
      view.setUint32(24, sampleRate, true);
      view.setUint32(28, sampleRate * 2, true);
      view.setUint16(32, 2, true);
      view.setUint16(34, 16, true);
      writeString(view, 36, 'data');
      view.setUint32(40, len, true);
      
      const pcmBytes = new Uint8Array(buffer, 44, len);
      pcmBytes.set(bytes);
      
      const blob = new Blob([buffer], { type: 'audio/wav' });
      const url = URL.createObjectURL(blob);
      const audio = new Audio(url);
      audio.play();
    };

    const Icon = ({ name, className }) => {
      const icons = {
        ChevronRight: <path d="m9 18 6-6-6-6"/>,
        ArrowLeft: <><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></>,
        CheckCircle2: <><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></>,
        Dumbbell: <><path d="M14.4 14.4 9.6 9.6"/><path d="M18.65 21.35a2.83 2.83 0 0 0 4-4L18.4 13.1a2.83 2.83 0 0 0-4 4z"/><path d="m21.5 15.5-6-6"/><path d="M10.9 5.6a2.83 2.83 0 0 0-4-4L2.65 5.85a2.83 2.83 0 0 0 4 4z"/><path d="m8.5 2.5 6 6"/></>,
        Timer: <><line x1="10" x2="14" y1="2" y2="2"/><line x1="12" x2="15" y1="14" y2="11"/><circle cx="12" cy="14" r="8"/></>,
        Flame: <path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>,
        Wind: <><path d="M17.7 7.7a2.5 2.5 0 1 1 1.8 4.3H2"/><path d="M9.6 4.6A2 2 0 1 1 11 8H2"/><path d="M12.6 19.4A2 2 0 1 0 14 16H2"/></>,
        Calendar: <><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></>,
        Play: <polygon points="6 3 20 12 6 21 6 3"/>,
        RotateCcw: <><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></>,
        X: <><path d="M18 6 6 18"/><path d="m6 6 12 12"/></>,
        Loader2: <path d="M21 12a9 9 0 1 1-6.219-8.56"/>,
        Trash2: <><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></>,
        Plus: <><path d="M5 12h14"/><path d="M12 5v14"/></>,
        Wand2: <><path d="m21.64 3.64-1.28-1.28a1.21 1.21 0 0 0-1.72 0L2.36 18.64a1.21 1.21 0 0 0 0 1.72l1.28 1.28a1.2 1.2 0 0 0 1.72 0L21.64 5.36a1.2 1.2 0 0 0 0-1.72Z"/><path d="m14 7 3 3"/><path d="M5 6v4"/><path d="M19 14v4"/><path d="M10 2v2"/><path d="M7 8H3"/><path d="M21 16h-4"/><path d="M11 3H9"/></>,
        Volume2: <><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></>
      };
      return (
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
          {icons[name]}
        </svg>
      );
    };

    const WorkoutApp = () => {
      const [currentView, setCurrentView] = useState('dashboard');
      const [selectedDay, setSelectedDay] = useState(null);
      const [activeStep, setActiveStep] = useState(0);
      const [timer, setTimer] = useState(0);
      const [isTimerActive, setIsTimerActive] = useState(false);
      const [completedWorkouts, setCompletedWorkouts] = useState([]);
      const [now, setNow] = useState(new Date());
      const [workoutToDelete, setWorkoutToDelete] = useState(null);

      // AI Features State
      const [showAIModal, setShowAIModal] = useState(false);
      const [aiPrompt, setAiPrompt] = useState("");
      const [isGeneratingAI, setIsGeneratingAI] = useState(false);
      const [aiGenerationStatus, setAiGenerationStatus] = useState("");
      const [aiError, setAiError] = useState("");

      const initialWorkouts = [
        {
          id: 1,
          title: "Leg Power & Definition",
          focus: "Lower Body",
          duration: "25 min",
          difficulty: "Moderate",
          image: "https://images.unsplash.com/photo-1434682881908-b43d0467b798?q=80&w=800&auto=format&fit=crop",
          exercises: [
            { name: "Warm-up: Arm Circles & High Knees", reps: "2 minutes", type: "warmup", detail: "Keep core tight, make wide circles with arms while bringing knees up to hip height." },
            { name: "Warm-up: Cat-Cow Stretch", reps: "1 minute", type: "warmup", detail: "On hands and knees. Inhale to arch back (cow), exhale to round spine (cat). Keep wrists directly under shoulders." },
            { name: "Goblet Squats", reps: "3 sets of 12", detail: "Hold one dumbbell vertically at chest. Keep chest up, push hips back, and squat until thighs are parallel to the floor.", equipment: "Dumbbell" },
            { name: "Bench Step-ups", reps: "3 sets of 10 per leg", detail: "Plant entire foot on bench. Push through the heel to lift, keeping chest proud. Lower down slowly with control.", equipment: "Bench" },
            { name: "Dumbbell Glute Bridges", reps: "3 sets of 15", detail: "Rest upper back on mat, feet flat. Place dumbbell on hips. Squeeze glutes to lift hips toward ceiling, creating a straight line.", equipment: "Mat & Dumbbell" },
            { name: "Calf Raises on Bench Edge", reps: "3 sets of 20", detail: "Stand with balls of feet on bench edge, dropping heels below edge. Push up onto toes, pause, then lower slowly.", equipment: "Bench" },
            { name: "Cool-down: Quad Stretch", reps: "45 seconds per side", type: "cooldown", detail: "Stand holding bench for balance. Pull heel to glute, keeping knees together and posture upright." },
            { name: "Cool-down: Child's Pose", reps: "1 minute", type: "cooldown", detail: "Kneel, sit back on heels, stretch arms far forward on mat. Rest forehead down and take deep, slow breaths." },
          ]
        },
        {
          id: 2,
          title: "Upper Body & Core Tone",
          focus: "Full Body",
          duration: "22 min",
          difficulty: "Light-Moderate",
          image: "https://images.unsplash.com/photo-1581009146145-b5ef050c2e1e?q=80&w=800&auto=format&fit=crop",
          exercises: [
            { name: "Warm-up: Shoulder Rolls", reps: "1 minute", type: "warmup", detail: "Stand tall. Roll shoulders smoothly up to ears, back, down, and forward in a fluid, continuous motion." },
            { name: "Warm-up: Plank Tap", reps: "1 minute", type: "warmup", detail: "Start in high plank. Keeping hips as still as possible, tap right hand to left shoulder, then switch sides." },
            { name: "Seated Dumbbell Press", reps: "3 sets of 12", detail: "Sit tall on bench, core braced. Press dumbbells overhead until arms are straight, then lower slowly to ear level.", equipment: "Bench & Dumbbells" },
            { name: "One-Arm Dumbbell Row", reps: "3 sets of 12 per side", detail: "One knee and hand on bench. Keep back flat. Pull dumbbell up to hip crease, squeezing shoulder blade at the top.", equipment: "Bench & Dumbbell" },
            { name: "Modified Push-ups", reps: "3 sets of 10", detail: "Hands slightly wider than shoulders on bench. Lower chest to edge, keeping body in a rigid, straight line from head to heels.", equipment: "Bench" },
            { name: "Dead Bug", reps: "3 sets of 12", detail: "Lie on back, arms up, knees bent at 90 degrees. Lower opposite arm and leg toward floor without letting lower back arch off mat.", equipment: "Mat" },
            { name: "Cool-down: Overhead Tricep Stretch", reps: "30 seconds per side", type: "cooldown", detail: "Reach one arm straight up, bend elbow so hand touches upper back. Gently push elbow back with opposite hand." },
            { name: "Cool-down: Cobra Stretch", reps: "1 minute", type: "cooldown", detail: "Lie face down, hands under shoulders. Gently press up to lift chest, keeping hips glued to mat and shoulders relaxed down." },
          ]
        }
      ];

      const [workouts, setWorkouts] = useState(initialWorkouts);

      useEffect(() => {
        let interval = null;
        if (isTimerActive) {
          interval = setInterval(() => {
            setTimer(prev => prev + 1);
          }, 1000);
        } else {
          clearInterval(interval);
        }
        return () => clearInterval(interval);
      }, [isTimerActive]);

      useEffect(() => {
        const timeInterval = setInterval(() => setNow(new Date()), 1000);
        return () => clearInterval(timeInterval);
      }, []);

      const generateWorkoutJSON = async (prompt) => {
        const payload = {
            contents: [{ parts: [{ text: `Create a custom, premium workout for a 58-year old woman based on this request: "${prompt}". Her goal is strength and toning. She has a workout bench, light dumbbells, and a yoga mat.` }] }],
            generationConfig: {
                responseMimeType: "application/json",
                responseSchema: {
                    type: "OBJECT",
                    properties: {
                        title: { type: "STRING" },
                        focus: { type: "STRING" },
                        duration: { type: "STRING" },
                        difficulty: { type: "STRING" },
                        imagePrompt: { type: "STRING", description: "A detailed prompt for an AI image generator to create a photorealistic cover image for this exact workout routine in a premium boutique gym. Focus on the equipment and atmosphere." },
                        exercises: {
                            type: "ARRAY",
                            items: {
                                type: "OBJECT",
                                properties: {
                                    name: { type: "STRING" },
                                    reps: { type: "STRING" },
                                    type: { type: "STRING", description: "Must be exactly: warmup, strength, or cooldown" },
                                    detail: { type: "STRING", description: "Form instructions" },
                                    equipment: { type: "STRING" }
                                },
                                required: ["name", "reps", "type"]
                            }
                        }
                    },
                    required: ["title", "focus", "duration", "difficulty", "imagePrompt", "exercises"]
                }
            }
        };
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
        const data = await fetchWithRetry(url, { method: 'POST', body: JSON.stringify(payload), headers: {'Content-Type': 'application/json'} });
        return JSON.parse(data.candidates[0].content.parts[0].text);
      };

      const generateImage = async (prompt) => {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`;
        const payload = {
            instances: { prompt: prompt },
            parameters: { sampleCount: 1 }
        };
        const data = await fetchWithRetry(url, { method: 'POST', body: JSON.stringify(payload), headers: {'Content-Type': 'application/json'} });
        if (data && data.predictions && data.predictions[0]) {
            return `data:image/png;base64,${data.predictions[0].bytesBase64Encoded}`;
        }
        return null;
      };

      const handleGenerateAIWorkout = async () => {
        if (!aiPrompt.trim() || isGeneratingAI) return;
        setAiError("");
        setIsGeneratingAI(true);
        
        try {
            setAiGenerationStatus("Designing your routine...");
            const workoutData = await generateWorkoutJSON(aiPrompt);
            
            setAiGenerationStatus("Generating cover image...");
            let coverImg = "https://images.unsplash.com/photo-1571019614242-c5c5dee9f50b?q=80&w=800&auto=format&fit=crop";
            try {
                const generatedImg = await generateImage(workoutData.imagePrompt);
                if (generatedImg) coverImg = generatedImg;
            } catch (imgError) {
                console.error("Image generation failed, falling back to default.", imgError);
            }

            const finalWorkout = { ...workoutData, id: Date.now(), image: coverImg };
            setWorkouts(prev => [...prev, finalWorkout]);
            setShowAIModal(false);
            setAiPrompt("");
        } catch (error) {
            console.error("AI Generation failed:", error);
            setAiError("Failed to generate workout. Please ensure your API key is correct.");
        }
        setIsGeneratingAI(false);
      };

      const formatTime = (seconds) => {
        const mins = Math.floor(seconds / 60);
        const secs = seconds % 60;
        return `${mins}:${secs.toString().padStart(2, '0')}`;
      };

      const startWorkout = (day) => {
        setSelectedDay(day);
        setActiveStep(0);
        setTimer(0);
        setIsTimerActive(true);
        setCurrentView('workout');
      };

      const nextStep = () => {
        if (activeStep < selectedDay.exercises.length - 1) {
          setActiveStep(activeStep + 1);
        } else {
          setIsTimerActive(false);
          setCompletedWorkouts([...completedWorkouts, selectedDay.id]);
          setCurrentView('summary');
        }
      };

      const Dashboard = () => (
        <div className="p-6 max-w-md mx-auto bg-zinc-950 min-h-screen text-zinc-100 pb-32">
          <header className="mb-8 mt-4 relative rounded-3xl overflow-hidden h-48 flex items-end p-6 shadow-lg shadow-zinc-900/50">
            <div className="absolute top-5 right-5 z-20 text-right">
              <p className="text-zinc-100 text-sm font-bold tracking-wide drop-shadow-md">
                {now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' })}
              </p>
              <p className="text-amber-500 text-[10px] font-bold tracking-widest uppercase drop-shadow-md mt-0.5">
                {now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' })}
              </p>
            </div>
            <img 
              src="https://images.unsplash.com/photo-1534438327276-14e5300c3a48?q=80&w=1470&auto=format&fit=crop" 
              alt="Premium Gym Background" 
              className="absolute inset-0 w-full h-full object-cover"
            />
            <div className="absolute inset-0 bg-gradient-to-t from-zinc-950 via-zinc-950/60 to-transparent" />
            <div className="relative z-10">
              <h1 className="text-4xl font-serif font-bold text-zinc-100 mb-1">Elevate</h1>
              <p className="text-amber-500 font-medium tracking-widest text-xs uppercase">Empowered Strength</p>
            </div>
          </header>

          <div className="bg-zinc-900 rounded-2xl p-6 shadow-sm border border-zinc-800 mb-8">
            <div className="flex justify-between items-center mb-4">
              <h2 className="text-lg font-bold text-zinc-100 flex items-center gap-2">
                <Icon name="Calendar" className="w-5 h-5 text-amber-500" />
                Weekly Progress
              </h2>
              <span className="text-xs font-bold uppercase tracking-wider text-zinc-400">
                {completedWorkouts.length}/3 Workouts
              </span>
            </div>
            <div className="flex gap-2">
              {[1, 2, 3].map(day => (
                <div 
                  key={day} 
                  className={`h-2 flex-1 rounded-full ${completedWorkouts.includes(day) ? 'bg-amber-500 shadow-[0_0_8px_rgba(245,158,11,0.4)]' : 'bg-zinc-800'}`}
                />
              ))}
            </div>
          </div>

          <div className="flex justify-between items-center mb-4">
            <h3 className="text-sm font-bold uppercase tracking-widest text-zinc-500">Your Routines</h3>
          </div>

          <div className="space-y-4">
            {workouts.length === 0 && (
              <div className="text-center py-8 text-zinc-500 text-sm border border-dashed border-zinc-800 rounded-2xl">
                No routines yet. Generate one to get started!
              </div>
            )}
            {workouts.map((workout) => (
              <button 
                key={workout.id}
                onClick={() => startWorkout(workout)}
                className="w-full text-left relative overflow-hidden rounded-2xl shadow-sm border border-zinc-800 flex items-center justify-between group active:scale-[0.98] transition-all min-h-[120px]"
              >
                <img 
                  src={workout.image} 
                  alt={workout.title}
                  className="absolute inset-0 w-full h-full object-cover opacity-30 group-hover:opacity-40 transition-opacity duration-500"
                />
                <div className="absolute inset-0 bg-gradient-to-r from-zinc-900 via-zinc-900/90 to-transparent" />
                
                <div 
                  onClick={(e) => { e.stopPropagation(); setWorkoutToDelete(workout.id); }}
                  className="absolute top-3 right-3 p-2 bg-zinc-950/60 backdrop-blur-md rounded-full text-zinc-400 hover:text-red-400 border border-zinc-700/50 hover:border-red-500/50 z-20 transition-colors"
                >
                  <Icon name="Trash2" className="w-4 h-4" />
                </div>

                <div className="relative z-10 p-5 w-full flex items-center justify-between pt-8">
                  <div>
                    <span className="text-xs font-bold text-amber-500 uppercase tracking-tighter block mb-1 drop-shadow-md">
                      {workout.focus}
                    </span>
                    <h4 className="text-lg font-bold text-zinc-100 drop-shadow-md pr-8">{workout.title}</h4>
                    <div className="flex gap-3 mt-2">
                      <span className="flex items-center gap-1 text-xs text-zinc-300 drop-shadow-md">
                        <Icon name="Timer" className="w-3 h-3" /> {workout.duration}
                      </span>
                      <span className="flex items-center gap-1 text-xs text-zinc-300 drop-shadow-md">
                        <Icon name="Dumbbell" className="w-3 h-3" /> {workout.difficulty}
                      </span>
                    </div>
                  </div>
                  <div className="bg-zinc-950/50 backdrop-blur-sm p-3 rounded-full border border-zinc-700/50 group-hover:border-amber-500/50 transition-colors">
                    <Icon name="ChevronRight" className="w-5 h-5 text-zinc-300 group-hover:text-amber-500" />
                  </div>
                </div>
              </button>
            ))}
          </div>
          
          {/* Floating Action Button for AI Generation */}
          <button 
            onClick={() => setShowAIModal(true)}
            className="fixed bottom-6 right-6 bg-amber-500 text-zinc-950 px-6 py-4 rounded-full shadow-[0_4px_20px_rgba(245,158,11,0.4)] hover:scale-105 active:scale-95 transition-all z-40 flex items-center gap-2 font-bold"
          >
            <Icon name="Wand2" className="w-5 h-5" /> Auto-Generate
          </button>
        </div>
      );

      const WorkoutPlayer = () => {
        const exercise = selectedDay.exercises[activeStep];
        const isWarmup = exercise.type === 'warmup';
        const isCooldown = exercise.type === 'cooldown';
        const progress = ((activeStep + 1) / selectedDay.exercises.length) * 100;
        
        const [isSpeaking, setIsSpeaking] = useState(false);

        const handleSpeakExercise = async (ex) => {
          if (isSpeaking) return;
          setIsSpeaking(true);
          try {
            const textToSpeak = `Next exercise: ${ex.name}. ${ex.reps}. ${ex.detail || ''}`;
            const payload = { 
                contents: [{ parts: [{ text: textToSpeak }] }], 
                generationConfig: { 
                    responseModalities: ["AUDIO"], 
                    speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } } 
                }, 
                model: "gemini-2.5-flash-preview-tts" 
            };
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`;
            const data = await fetchWithRetry(url, { method: 'POST', body: JSON.stringify(payload), headers: {'Content-Type': 'application/json'} });
            
            const base64 = data.candidates[0].content.parts[0].inlineData.data;
            const mimeType = data.candidates[0].content.parts[0].inlineData.mimeType;
            let sampleRate = 24000;
            const rateMatch = mimeType.match(/rate=(\d+)/);
            if (rateMatch) sampleRate = parseInt(rateMatch[1], 10);
            
            playAudioFromBase64PCM(base64, sampleRate);
          } catch(e) {
            console.error("Text-to-Speech failed:", e);
          }
          setIsSpeaking(false);
        };

        return (
          <div className="bg-zinc-950 min-h-screen flex flex-col relative overflow-hidden text-zinc-100">
            <img 
              src={selectedDay.image} 
              alt={selectedDay.title}
              className="absolute inset-0 w-full h-full object-cover opacity-30 blur-sm scale-105"
            />
            <div className="absolute inset-0 bg-gradient-to-b from-zinc-950/60 via-zinc-950/80 to-zinc-950/95" />

            <div className="relative z-10 flex flex-col h-full flex-1">
              <div className="p-4 flex items-center justify-between">
                <button onClick={() => setCurrentView('dashboard')} className="p-2 bg-zinc-900/50 rounded-full backdrop-blur-md border border-zinc-800 text-zinc-100 hover:bg-zinc-800 transition-colors">
                  <Icon name="ArrowLeft" className="w-6 h-6" />
                </button>
                <div className="text-center">
                  <h2 className="font-bold text-zinc-100 drop-shadow-md">{selectedDay.title}</h2>
                  <p className="text-xs text-amber-500 uppercase tracking-widest font-bold mt-1 drop-shadow-md">{formatTime(timer)} elapsed</p>
                </div>
                <div className="w-10" />
              </div>

              <div className="h-1 bg-zinc-800/50 w-full mt-2 backdrop-blur-sm">
                <div 
                  className="h-full bg-amber-500 transition-all duration-500 shadow-[0_0_10px_rgba(245,158,11,0.5)]" 
                  style={{ width: `${progress}%` }}
                />
              </div>

              <div className="flex-1 flex flex-col p-6 items-center justify-center text-center">
                <div className="bg-zinc-900/40 backdrop-blur-xl p-8 rounded-[2rem] border border-zinc-700/30 w-full max-w-sm shadow-2xl flex flex-col items-center relative overflow-hidden">
                  
                  <div className="mb-6">
                    {isWarmup ? (
                      <div className="bg-orange-500/20 text-orange-400 border border-orange-500/30 px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-widest flex items-center gap-2 backdrop-blur-md">
                        <Icon name="Flame" className="w-3.5 h-3.5" /> Warm-up
                      </div>
                    ) : isCooldown ? (
                      <div className="bg-blue-500/20 text-blue-400 border border-blue-500/30 px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-widest flex items-center gap-2 backdrop-blur-md">
                        <Icon name="Wind" className="w-3.5 h-3.5" /> Cool-down
                      </div>
                    ) : (
                      <div className="bg-zinc-800/60 text-zinc-200 border border-zinc-600/30 px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-widest flex items-center gap-2 backdrop-blur-md">
                        <Icon name="Dumbbell" className="w-3.5 h-3.5 text-amber-500" /> Strength
                      </div>
                    )}
                  </div>

                  <h3 className="text-3xl font-serif font-bold text-zinc-100 mb-6 leading-tight drop-shadow-md flex items-center justify-center gap-3">
                    {exercise.name}
                    <button 
                      onClick={() => handleSpeakExercise(exercise)} 
                      disabled={isSpeaking}
                      className="p-2.5 bg-amber-500/20 text-amber-500 rounded-full active:scale-95 transition-all hover:bg-amber-500/30"
                    >
                      {isSpeaking ? <Icon name="Loader2" className="w-5 h-5 animate-spin" /> : <Icon name="Volume2" className="w-5 h-5" />}
                    </button>
                  </h3>
                  
                  <div className="text-5xl font-light text-amber-500 mb-8 font-sans drop-shadow-lg">
                    {exercise.reps}
                  </div>

                  {exercise.detail && (
                    <div className="w-full bg-zinc-950/40 border border-zinc-800/50 p-5 rounded-2xl text-zinc-300 text-sm italic mb-6 shadow-inner">
                      "{exercise.detail}"
                    </div>
                  )}

                  {exercise.equipment && (
                    <div className="text-xs text-amber-500/80 uppercase tracking-widest font-bold">
                      Equipment: {exercise.equipment}
                    </div>
                  )}
                </div>
              </div>

              <div className="p-6 space-y-4 pb-10 max-w-md mx-auto w-full">
                <button 
                  onClick={nextStep}
                  className="w-full bg-amber-500 text-zinc-950 py-5 rounded-2xl font-bold flex items-center justify-center gap-2 shadow-[0_4px_20px_rgba(245,158,11,0.3)] active:scale-95 transition-all"
                >
                  {activeStep === selectedDay.exercises.length - 1 ? 'Finish Workout' : 'Next Exercise'}
                  <Icon name="ChevronRight" className="w-5 h-5" />
                </button>
                
                <div className="flex gap-4">
                  <button 
                    onClick={() => setIsTimerActive(!isTimerActive)}
                    className="flex-1 bg-zinc-900/50 backdrop-blur-md border border-zinc-700/50 text-zinc-200 hover:bg-zinc-800/80 py-4 rounded-xl font-bold flex items-center justify-center gap-2 transition-all active:scale-95"
                  >
                    {isTimerActive ? <Icon name="Play" className="w-4 h-4" /> : <Icon name="RotateCcw" className="w-4 h-4" />}
                    {isTimerActive ? 'Pause Timer' : 'Resume Timer'}
                  </button>
                </div>
              </div>
            </div>
          </div>
        );
      };

      const Summary = () => (
        <div className="bg-zinc-950 min-h-screen text-zinc-100 p-8 flex flex-col items-center justify-center text-center relative overflow-hidden">
          <img 
            src="https://images.unsplash.com/photo-1552674605-db6ffd4facb5?q=80&w=800&auto=format&fit=crop"
            className="absolute inset-0 w-full h-full object-cover opacity-10"
          />
          <div className="absolute inset-0 bg-gradient-to-t from-zinc-950 via-zinc-950/80 to-zinc-950/40" />

          <div className="relative z-10 flex flex-col items-center w-full">
            <div className="bg-amber-500/10 p-6 rounded-full mb-6 border border-amber-500/20 backdrop-blur-sm">
              <Icon name="CheckCircle2" className="w-16 h-16 text-amber-500" />
            </div>
            <h2 className="text-4xl font-serif font-bold mb-2 text-zinc-100">Well Done</h2>
            <p className="text-zinc-400 mb-12">You're becoming stronger with every session.</p>
            
            <div className="grid grid-cols-2 gap-4 w-full max-w-xs mb-12">
              <div className="bg-zinc-900/80 backdrop-blur-sm border border-zinc-800 p-4 rounded-2xl">
                <div className="text-xs text-zinc-500 uppercase font-bold mb-1">Time</div>
                <div className="text-xl font-bold">{formatTime(timer)}</div>
              </div>
              <div className="bg-zinc-900/80 backdrop-blur-sm border border-zinc-800 p-4 rounded-2xl">
                <div className="text-xs text-zinc-500 uppercase font-bold mb-1">Moves</div>
                <div className="text-xl font-bold">{selectedDay.exercises.length}</div>
              </div>
            </div>

            <button 
              onClick={() => setCurrentView('dashboard')}
              className="w-full max-w-xs bg-amber-500 text-zinc-950 py-5 rounded-2xl font-bold shadow-[0_4px_20px_rgba(245,158,11,0.3)] active:scale-95 transition-all"
            >
              Return to Dashboard
            </button>
          </div>
        </div>
      );

      return (
        <div className="font-sans antialiased bg-zinc-950 relative min-h-screen">
          {currentView === 'dashboard' && <Dashboard />}
          {currentView === 'workout' && <WorkoutPlayer />}
          {currentView === 'summary' && <Summary />}

          {/* Delete Confirmation Modal */}
          {workoutToDelete && (
            <div className="fixed inset-0 z-[60] bg-zinc-950/80 backdrop-blur-sm flex items-center justify-center p-4 animate-in fade-in duration-200">
              <div className="bg-zinc-900 border border-zinc-800 p-6 rounded-[2rem] max-w-sm w-full shadow-2xl">
                <div className="bg-red-500/10 w-16 h-16 rounded-full flex items-center justify-center mb-4 mx-auto border border-red-500/20">
                  <Icon name="Trash2" className="w-8 h-8 text-red-500" />
                </div>
                <h3 className="text-xl font-bold text-zinc-100 mb-2 text-center">Delete Routine?</h3>
                <p className="text-zinc-400 mb-8 text-center text-sm">Are you sure you want to remove this workout from your dashboard? This action cannot be undone.</p>
                <div className="flex gap-3">
                  <button 
                    onClick={() => setWorkoutToDelete(null)} 
                    className="flex-1 py-4 bg-zinc-800 text-zinc-200 rounded-xl font-bold active:scale-95 transition-all"
                  >
                    Cancel
                  </button>
                  <button 
                    onClick={() => {
                      setWorkouts(workouts.filter(w => w.id !== workoutToDelete));
                      setWorkoutToDelete(null);
                    }} 
                    className="flex-1 py-4 bg-red-500/20 text-red-500 border border-red-500/50 rounded-xl font-bold active:scale-95 transition-all"
                  >
                    Delete
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* AI Generator Modal */}
          {showAIModal && (
            <div className="fixed inset-0 z-[60] bg-zinc-950/90 backdrop-blur-md flex items-center justify-center p-4 animate-in fade-in duration-200">
              <div className="bg-zinc-900 border border-zinc-800 p-6 rounded-[2rem] max-w-sm w-full shadow-2xl relative">
                <button 
                  onClick={() => !isGeneratingAI && setShowAIModal(false)}
                  className="absolute top-4 right-4 p-2 text-zinc-400 hover:text-zinc-100 bg-zinc-800/50 rounded-full transition-colors"
                >
                  <Icon name="X" className="w-5 h-5" />
                </button>
                
                <div className="bg-amber-500/10 w-16 h-16 rounded-full flex items-center justify-center mb-6 border border-amber-500/20">
                  <Icon name="Wand2" className="w-8 h-8 text-amber-500" />
                </div>
                
                <h3 className="text-xl font-bold text-zinc-100 mb-2">Design Your Workout</h3>
                <p className="text-zinc-400 mb-6 text-sm">Tell your AI coach exactly what you need today. It will design the routine and create a custom cover image.</p>
                
                {aiError && (
                  <div className="mb-4 p-3 bg-red-500/10 border border-red-500/30 rounded-xl text-red-400 text-xs">
                    {aiError}
                  </div>
                )}

                <textarea 
                  value={aiPrompt}
                  onChange={(e) => setAiPrompt(e.target.value)}
                  disabled={isGeneratingAI}
                  placeholder="e.g. A quick 15 minute core session focusing on stability..."
                  className="w-full bg-zinc-950 border border-zinc-800 rounded-xl p-4 text-zinc-100 text-sm focus:outline-none focus:border-amber-500 transition-colors resize-none mb-4"
                  rows={4}
                />
                
                <button 
                  onClick={handleGenerateAIWorkout}
                  disabled={isGeneratingAI || !aiPrompt.trim()}
                  className="w-full bg-amber-500 text-zinc-950 py-4 rounded-xl font-bold flex items-center justify-center gap-2 active:scale-95 transition-all disabled:opacity-50 disabled:active:scale-100"
                >
                  {isGeneratingAI ? (
                    <><Icon name="Loader2" className="w-5 h-5 animate-spin" /> {aiGenerationStatus}</>
                  ) : (
                    "Generate Routine"
                  )}
                </button>
              </div>
            </div>
          )}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<WorkoutApp />);
  </script>
</body>
</html>
